<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | MUN Conference</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#081827;
color:white;
font-family:Poppins,sans-serif;
}

.container{
max-width:900px;
margin:120px auto 60px;
padding:40px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border-radius:20px;
}

h1{
text-align:center;
color:#D4AF37;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/3;
}

input,
select,
textarea{

width:100%;
padding:15px;
background:#10243a;
border:none;
border-radius:10px;
color:white;
font-size:16px;

}

input:focus,
select:focus,
textarea:focus{

outline:2px solid #D4AF37;

}

textarea{
resize:vertical;
min-height:120px;
}

button{

grid-column:1/3;

padding:18px;

background:#D4AF37;

color:black;

font-size:18px;

font-weight:bold;

border:none;

border-radius:50px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

.note{

margin-top:25px;

text-align:center;

color:#bbbbbb;

font-size:14px;

}

@media(max-width:768px){

form{

grid-template-columns:1fr;

}

.full,
button{

grid-column:auto;

}

.container{

margin:90px 20px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Delegate Registration</h1>

<form id="registrationForm">

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email Address"
required>

<input type="tel"
placeholder="Phone Number"
required>

<input type="text"
placeholder="School / Institution"
required>

<select required>

<option value="">Select Delegate Type</option>

<option>Individual Delegate</option>

<option>School Delegation</option>

<option>Observer</option>

<option>International Press</option>

</select>

<select required>

<option value="">Committee Preference</option>

<option>UNGA</option>

<option>UNSC</option>

<option>UNHRC</option>

<option>UNICEF</option>

<option>WHO</option>

<option>AIPPM</option>

<option>UNEP</option>

</select>

<input class="full"
type="text"
placeholder="Country / Portfolio Preference">

<textarea class="full"
placeholder="Previous MUN Experience (Optional)"></textarea>

<select class="full" required>

<option value="">Payment Status</option>

<option>Paid</option>

<option>Will Pay Later</option>

</select>

<button type="submit">

Register Now

</button>

</form>

<p class="note">

After submitting, you will receive a confirmation email.

</p>

</div>

<script>

document.getElementById("registrationForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Registration Successful! Thank you for registering.");

this.reset();

});

</script>

</body>
</html>
